apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: learn-jenkins-app
spec:
  rules:
  - host: learn-staging.k3.l
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: learn-jenkins-app
            port:
              number: 80